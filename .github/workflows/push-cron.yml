name: Push Cron

on:
  schedule:
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 * * * *'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install web-push
      - name: Send pushes
        run: node -e "
          const w=require('web-push');
          w.setVapidDetails('https://ji970.github.io/game-respawn/','BEpLgLTBfLpVlTIWRkVQAVEO2XslKwqpo3UKOCUI99m9bTKnFzmCwkJ5bwPlzbvd1KsDkP8HzGzMts5BtnptHPw','EX11Sl4dbvV4nQRG1hD28tp0RkLAWTPy2jczd_cFCHI');
          const SU='https://gwjqhrqmfamjrdhllrqk.supabase.co';
          const SK='sb_publishable_9yotjhKymQTb-QfAEG0qbw_c4-btV6l';
          (async()=>{
            const r=await fetch(SU+'/rest/v1/push_queue?sent=eq.false&limit=50',{headers:{apikey:SK,Authorization:'Bearer '+SK}});
            let p=await r.json();if(!Array.isArray(p))return;
            const now=Date.now();const due=p.filter(x=>new Date(x.notify_at).getTime()<=now);
            for(const x of due){
              try{
                await w.sendNotification({endpoint:x.endpoint,keys:{p256dh:x.p256dh,auth:x.auth}},JSON.stringify({title:x.title,body:x.body}));
                await fetch(SU+'/rest/v1/push_queue?id=eq.'+x.id,{method:'PATCH',headers:{apikey:SK,Authorization:'Bearer '+SK,'Content-Type':'application/json'},body:JSON.stringify({sent:true})});
              }catch(e){if(e.statusCode===410||e.statusCode===404)await fetch(SU+'/rest/v1/push_queue?id=eq.'+x.id,{method:'PATCH',headers:{apikey:SK,Authorization:'Bearer '+SK,'Content-Type':'application/json'},body:JSON.stringify({sent:true})})}
            }
          })();
        "
