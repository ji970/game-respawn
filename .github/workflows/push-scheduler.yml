name: Push Notification Scheduler

on:
  schedule:
    - cron: '* * * * *'  # every minute
  workflow_dispatch:

jobs:
  send-pushes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install web-push
      - name: Send due notifications
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          VAPID_PUBLIC: ${{ secrets.VAPID_PUBLIC }}
          VAPID_PRIVATE: ${{ secrets.VAPID_PRIVATE }}
        run: |
          node -e "
          const webpush = require('web-push');

          webpush.setVapidDetails(
            'https://ji970.github.io/game-respawn/',
            process.env.VAPID_PUBLIC,
            process.env.VAPID_PRIVATE
          );

          async function main() {
            // Get unsent pushes due now
            const res = await fetch(
              process.env.SUPABASE_URL + '/rest/v1/push_queue?sent=eq.false&notify_at=lte.' + new Date().toISOString() + '&limit=50',
              { headers: { apikey: process.env.SUPABASE_KEY, Authorization: 'Bearer ' + process.env.SUPABASE_KEY } }
            );
            const pushes = await res.json();
            if (!Array.isArray(pushes) || pushes.length === 0) { console.log('No pending pushes'); return; }

            for (const p of pushes) {
              try {
                await webpush.sendNotification({
                  endpoint: p.endpoint,
                  keys: { p256dh: p.p256dh, auth: p.auth }
                }, JSON.stringify({ title: p.title, body: p.body }));
                // Mark as sent
                await fetch(
                  process.env.SUPABASE_URL + '/rest/v1/push_queue?id=eq.' + p.id,
                  {
                    method: 'PATCH',
                    headers: { apikey: process.env.SUPABASE_KEY, Authorization: 'Bearer ' + process.env.SUPABASE_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sent: true })
                  }
                );
                console.log('Sent: ' + p.title);
              } catch(e) {
                console.error('Failed: ' + p.title + ' - ' + e.message);
                // If subscription expired, mark as sent to stop retrying
                if (e.statusCode === 410 || e.statusCode === 404) {
                  await fetch(
                    process.env.SUPABASE_URL + '/rest/v1/push_queue?id=eq.' + p.id,
                    {
                      method: 'PATCH',
                      headers: { apikey: process.env.SUPABASE_KEY, Authorization: 'Bearer ' + process.env.SUPABASE_KEY, 'Content-Type': 'application/json' },
                      body: JSON.stringify({ sent: true })
                    }
                  );
                }
              }
            }
          }
          main();
          "
