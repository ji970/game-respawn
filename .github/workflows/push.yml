name: Push Scheduler

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install web-push
      - name: Send due pushes
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          VAPID_PUBLIC: ${{ secrets.VAPID_PUBLIC }}
          VAPID_PRIVATE: ${{ secrets.VAPID_PRIVATE }}
        run: |
          node -e "
          const w=require('web-push');
          w.setVapidDetails('https://ji970.github.io/game-respawn/',process.env.VAPID_PUBLIC,process.env.VAPID_PRIVATE);
          (async()=>{
            const r=await fetch(process.env.SUPABASE_URL+'/rest/v1/push_queue?sent=eq.false&limit=50',{headers:{apikey:process.env.SUPABASE_KEY,Authorization:'Bearer '+process.env.SUPABASE_KEY}});
            let p=await r.json();if(!Array.isArray(p))return;
            const now=Date.now();p=p.filter(x=>new Date(x.notify_at).getTime()<=now);
            for(const x of p){
              try{
                await w.sendNotification({endpoint:x.endpoint,keys:{p256dh:x.p256dh,auth:x.auth}},JSON.stringify({title:x.title,body:x.body}));
                await fetch(process.env.SUPABASE_URL+'/rest/v1/push_queue?id=eq.'+x.id,{method:'PATCH',headers:{apikey:process.env.SUPABASE_KEY,Authorization:'Bearer '+process.env.SUPABASE_KEY,'Content-Type':'application/json'},body:JSON.stringify({sent:true})});
              }catch(e){if(e.statusCode===410||e.statusCode===404)await fetch(process.env.SUPABASE_URL+'/rest/v1/push_queue?id=eq.'+x.id,{method:'PATCH',headers:{apikey:process.env.SUPABASE_KEY,Authorization:'Bearer '+process.env.SUPABASE_KEY,'Content-Type':'application/json'},body:JSON.stringify({sent:true})})}
            }
          })();
          "
