<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --surface2: #222240;
  --text: #e0e0e0;
  --text2: #a0a0b8;
  --accent: #4fc3f7;
  --accent2: #ffb74d;
  --danger: #ef5350;
  --success: #66bb6a;
  --border: #2a2a45;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
}

/* Header */
header {
  background: var(--surface);
  padding: 12px 16px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 10;
}
header h1 { font-size: 18px; font-weight: 600; letter-spacing: 1px; }
header .sub { font-size: 11px; color: var(--text2); margin-top: 2px; }

/* Category tabs */
nav {
  display: flex;
  overflow-x: auto;
  gap: 6px;
  padding: 10px 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 60px;
  z-index: 9;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
nav::-webkit-scrollbar { display: none; }
nav button {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
nav button.active {
  background: var(--accent);
  color: #000;
  border-color: var(--accent);
  font-weight: 600;
}

/* Resource grid */
main { padding: 12px; max-width: 600px; margin: 0 auto; }
.category-title { font-size: 14px; color: var(--text2); padding: 8px 4px; display: none; }
.category-title.visible { display: block; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 10px;
}

/* Resource card */
.card {
  background: var(--surface);
  border-radius: 12px;
  padding: 12px 8px;
  text-align: center;
  cursor: pointer;
  position: relative;
  border: 2px solid transparent;
  transition: border-color 0.2s, transform 0.15s;
}
.card:active { transform: scale(0.95); }
.card.idle { border-color: transparent; }
.card.running { border-color: var(--accent); animation: pulse 2s infinite; }
.card.expired { border-color: var(--success); }

@keyframes pulse {
  0%, 100% { border-color: var(--accent); }
  50% { border-color: rgba(79,195,247,0.3); }
}

.card .icon-wrap {
  width: 48px; height: 48px;
  margin: 0 auto 6px;
  border-radius: 50%;
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}
.card .icon-wrap img {
  width: 100%; height: 100%;
  object-fit: cover;
}
.card .icon-wrap .placeholder {
  font-size: 22px;
  color: var(--text2);
}
.card .name {
  font-size: 13px;
  font-weight: 500;
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card .time-label {
  font-size: 10px;
  color: var(--text2);
  margin-top: 2px;
}
.card .countdown {
  font-size: 11px;
  font-weight: 700;
  color: var(--accent2);
  margin-top: 4px;
  min-height: 16px;
}
.card .countdown.expired-text { color: var(--success); }
.card .cancel-btn {
  position: absolute;
  top: 2px; right: 2px;
  width: 22px; height: 22px;
  border-radius: 50%;
  border: none;
  background: var(--danger);
  color: #fff;
  font-size: 12px;
  line-height: 22px;
  cursor: pointer;
  display: none;
  padding: 0;
}
.card.running .cancel-btn { display: block; }
.card.running .cancel-btn:active { background: #c62828; }

/* Notify permission banner */
.permission-banner {
  background: var(--surface2);
  text-align: center;
  padding: 10px;
  font-size: 12px;
  color: var(--accent2);
  cursor: pointer;
  display: none;
}
.permission-banner.show { display: block; }

/* iOS install guide */
.ios-guide {
  display: none;
  background: #1b1b2f;
  border-bottom: 1px solid #7c4dff;
  padding: 10px 14px;
  font-size: 12px;
  color: #e0e0e0;
  line-height: 1.5;
  position: relative;
}
.ios-guide.show { display: block; }
.ios-guide .close-guide {
  position: absolute;
  right: 8px; top: 8px;
  background: none; border: none;
  color: var(--text2); font-size: 16px;
  cursor: pointer; padding: 4px 8px;
}
.ios-guide .icon-share {
  display: inline-block;
  width: 16px; height: 16px;
  border: 2px solid #4fc3f7;
  border-radius: 3px;

}
.ios-guide .icon-share::after {

/* Reset all button */

.toolbar button {

  color: var(--text2);

  cursor: pointer;

/* Clone button */

  border-radius: 50%;

  font-size: 14px; line-height: 18px;

.card.running .clone-btn { display: block; }

  top: 100%;

.clone-popup button:active { background: var(--accent); color: #000; }

/* Lock screen */
.lock-overlay {

  background: #0f0f1a;

.lock-box {

.lock-box .lock-sub {

.lock-box input {
  width: 100%; padding: 12px; border-radius: 10px;

  color: var(--text); font-size: 18px; text-align: center;

  width: 100%; padding: 14px; margin-top: 14px;

.lock-error { color: var(--danger); font-size: 12px; margin-top: 10px; min-height: 18px; }
.lock-footer {

.lock-status.show { display: block; }

/* Toast */
.toast {

  background: var(--surface2);

  z-index: 100;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
  border: 1px solid var(--border);
}
.toast.show { opacity: 1; }

<script>
// ====== 激活码验证 ======
const ACTIVATION_SECRET = '625719'; // 和 keygen.html 保持一致
const SUPABASE_URL = 'https://gwjqhrqmfamjrdhllrqk.supabase.co';
const SUPABASE_KEY = 'sb_publishable_9yotjhKymQTb-QfAEG0qbw_c4-btV6l';

function deviceFingerprint() {
  const parts = [
    screen.width + 'x' + screen.height,
    navigator.language,
    navigator.platform,
    Intl.DateTimeFormat().resolvedOptions().timeZone,
    navigator.hardwareConcurrency || '0',
  ];
  return parts.join('|');
}

async function hmacHex(message, secret) {
  const encoder = new TextEncoder();
  const key = await crypto.subtle.importKey(
    'raw', encoder.encode(secret),
    { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']
  );
  const sig = await crypto.subtle.sign('HMAC', key, encoder.encode(message));
  return Array.from(new Uint8Array(sig))
    .map(b => b.toString(16).padStart(2, '0')).join('');
}

function getActivation() {
  try { return JSON.parse(localStorage.getItem('activation')); }
  catch(e) { return null; }
}

async function checkActivation() {
  const act = getActivation();
  if (!act || !act.expiryHex || !act.sig) return false;

  // Verify signature
  const expectedSig = (await hmacHex(act.expiryHex, ACTIVATION_SECRET)).slice(0, 8);
  if (act.sig !== expectedSig) return false;

  // Check device binding (local fingerprint)
  if (act.device && act.device !== deviceFingerprint()) return false;

  // Check expiry
  if (act.expiryHex === 'ffffffff') return true; // permanent
  const expiry = parseInt(act.expiryHex, 16) * 1000;
  if (Date.now() > expiry) return false;

  return true;
}

async function activate() {
  const input = document.getElementById('codeInput').value.replace(/-/g, '').trim();
  const errEl = document.getElementById('lockError');
  const btn = document.querySelector('#lockScreen button');
  btn.disabled = true; btn.textContent = '验证中...';

  if (input.length !== 16 || !/^[0-9a-fA-F]+$/.test(input)) {
    errEl.textContent = '激活码格式不正确';
    btn.disabled = false; btn.textContent = '激活';
    return;
  }

  const expiryHex = input.slice(0, 8);
  const sig = input.slice(8, 16);

  // Verify signature
  const expectedSig = (await hmacHex(expiryHex, ACTIVATION_SECRET)).slice(0, 8);
  if (sig !== expectedSig) {
    errEl.textContent = '激活码无效';
    btn.disabled = false; btn.textContent = '激活';
    return;
  }

  // Check not expired
  if (expiryHex !== 'ffffffff') {
    const expiry = parseInt(expiryHex, 16) * 1000;
    if (Date.now() > expiry) {
      errEl.textContent = '激活码已过期';
      btn.disabled = false; btn.textContent = '激活';
      return;
    }
  }

  const device = deviceFingerprint();
  const codeHash = (await hmacHex(input, ACTIVATION_SECRET)).slice(0, 16);

  // Server verification (if Supabase configured)
  if (SUPABASE_URL && SUPABASE_KEY) {
    try {
      // Check if code already claimed
      const checkRes = await fetch(
        SUPABASE_URL + '/rest/v1/activations?code_hash=eq.' + codeHash + '&select=device',
        { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } }
      );
      const existing = await checkRes.json();

      if (existing.length > 0 && existing[0].device !== device) {
        errEl.textContent = '此激活码已在其他设备使用';
        btn.disabled = false; btn.textContent = '激活';
        return;
      }

      if (existing.length === 0) {
        // Claim this code
        await fetch(SUPABASE_URL + '/rest/v1/activations', {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': 'Bearer ' + SUPABASE_KEY,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal',
          },
          body: JSON.stringify({
            code_hash: codeHash,
            device: device,
          }),
        });
      }
    } catch(e) {
      errEl.textContent = '网络异常，请检查网络后重试';
      btn.disabled = false; btn.textContent = '激活';
      return;
    }
  }

  // Save locally
  localStorage.setItem('activation', JSON.stringify({
    expiryHex: expiryHex,
    sig: sig,
    activatedAt: Date.now(),
    device: device,
  }));

  document.getElementById('lockScreen').classList.add('hidden');
  updateStatus();
  initApp();
}

function updateStatus() {
  const act = getActivation();
  const el = document.getElementById('lockStatus');
  if (!act) return;
  if (act.expiryHex === 'ffffffff') {
    el.textContent = '已激活（永久）';
  } else {
    const remaining = Math.ceil((parseInt(act.expiryHex, 16) * 1000 - Date.now()) / 86400000);
    el.textContent = '已激活（剩余' + remaining + '天）';
  }
  el.classList.add('show');
}

// ====== 状态管理 ======
const STORAGE_KEY = 'respawn_timers';
const islandSelections = {}; // per-resource island selection (UI only, defaults to 1)
const MIN_CHECK_INTERVAL = 2000; // 2秒检查一次
let testMode = false; // 测试模式：1分钟=1秒
let currentCat = 'crop';

function loadTimers() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch(e) { return {}; }
}
function saveTimers(t) { localStorage.setItem(STORAGE_KEY, JSON.stringify(t)); }

function getTimerState(resId) {
  const timers = loadTimers();
  return timers[resId] || null;
}

// ====== 通知 ======
function requestNotificationPermission() {
  if (!('Notification' in window)) {
    toast('你的浏览器不支持通知功能');
    return;
  }
  Notification.requestPermission().then(p => {
    if (p === 'granted') {
      document.getElementById('permBanner').classList.remove('show');
      toast('通知已开启');
    } else {
      toast('通知权限被拒绝，请在浏览器设置中开启');
    }
  });
}

function notify(title, body) {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'granted') {
    try {
      const n = new Notification(title, {
        body: body,
        icon: 'icons/icon-192.png',
        badge: 'icons/icon-72.png',
        vibrate: [200, 100, 200],
        tag: 'respawn-notify',
        renotify: true,
      });
      setTimeout(() => n.close(), 8000);
    } catch(e) { /* ignore */ }
  }
  // Fallback: flash title bar so user notices even without notification permission
  let count = 0;
  const origTitle = document.title;
  const flash = setInterval(() => {
    document.title = (count % 2 === 0) ? '🔔 ' + title : origTitle;
    count++;
    if (count >= 6) { clearInterval(flash); document.title = origTitle; }
  }, 800);
}

// ====== 渲染 ======
function formatTime(minutes) {
  if (minutes < 60) return minutes + '分钟';
  if (minutes < 1440) {
    const h = Math.floor(minutes / 60);
    const m = minutes % 60;
    return m > 0 ? h + '小时' + m + '分' : h + '小时';
  }
  const d = Math.floor(minutes / 1440);
  const rest = minutes % 1440;
  const h = Math.floor(rest / 60);
  if (h > 0) return d + '天' + h + '小时';
  return d + '天';
}

function formatCountdown(remainingSeconds) {
  if (remainingSeconds <= 0) return '已刷新';
  const s = Math.abs(remainingSeconds);
  const d = Math.floor(s / 86400);
  const h = Math.floor((s % 86400) / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  let parts = [];
  if (d > 0) parts.push(d + '天');
  if (h > 0) parts.push(h + '时');
  if (m > 0) parts.push(m + '分');
  if (parts.length === 0 || (parts.length === 1 && d === 0 && h === 0 && m < 5)) {
    parts.push(sec + '秒');
  }
  return parts.join('');
}

function renderNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = categories.map(c =>
    `<button class="${c.key === currentCat ? 'active' : ''}" data-cat="${c.key}">${c.label}</button>`
  ).join('');
  nav.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      currentCat = btn.dataset.cat;
      renderNav();
      renderCards();
    });
  });
}

function renderCards() {
  const main = document.getElementById('main');
  const timers = loadTimers();
  let items;
  if (currentCat === 'active') {
    // Show resources with active or completed timers
    items = resources.filter(r => !!timers[r.id]);
  } else {
    items = resources.filter(r => r.cat === currentCat);
  }

  if (items.length === 0) {
    main.innerHTML = `<div style="text-align:center;padding:40px 20px;color:var(--text2)">
      <div style="font-size:48px;margin-bottom:12px">⏱️</div>
      <div>${currentCat === 'active' ? '暂无活跃计时，点击物资卡片开始' : '该分类暂无物资'}</div>
    </div>`;
    return;
  }

  main.innerHTML = `<div class="grid">${items.map(r => {
    const state = timers[r.id];
    const hasActiveClone = state && state.clones &&
      Object.values(state.clones).some(c => c && (c.minNotified === false || c.maxNotified === false));
    const mainRunning = state && (state.minNotified === false || state.maxNotified === false);
    const isRunning = mainRunning || hasActiveClone;
    const isExpired = state && state.minNotified === true && state.maxNotified === true && !hasActiveClone;
    const cls = isExpired ? 'expired' : (isRunning ? 'running' : 'idle');

    let countdownHtml = '';
    let countdownCls = '';
    if (isRunning && state.startTime) {
      const now = Date.now();
      const mult = testMode ? 60 : 1;
      const elapsed = (now - state.startTime) / 1000 * mult;
      // Find the next notification time
      let nextCheckSec = Infinity;
      if (state.daily) {
        countdownHtml = '每日定时中';
      } else {
      const ADV = 2;
      if (state.minNotified === false && r.min !== r.max) {
        nextCheckSec = Math.max(0, r.min * 60 - ADV * 60) - elapsed;
        if (nextCheckSec <= 0) nextCheckSec = 0;
      }
      if (state.maxNotified === false) {
        const maxSec = Math.max(0, r.max * 60 - ADV * 60) - elapsed;
        if (maxSec < nextCheckSec && maxSec > 0) nextCheckSec = maxSec;
        if (maxSec <= 0 && state.minNotified === true) nextCheckSec = 0;
      }
      if (nextCheckSec === Infinity) nextCheckSec = Math.max(0, r.max * 60 - ADV * 60) - elapsed;
      if (nextCheckSec <= 0) {
        countdownHtml = '已刷新';
        countdownCls = 'expired-text';
      } else {
        countdownHtml = '⏳ ' + formatCountdown(Math.ceil(nextCheckSec));
      }
      }
    } else if (isExpired) {
      countdownHtml = '✅ 已刷新';
      countdownCls = 'expired-text';
    }

    const timeLabel = r.v ? formatTime(r.min) + '~' + formatTime(r.max) : formatTime(r.min);
    const noteAttr = r.note ? ` title="${r.note}"` : '';

    const island = (state && state.island) || (islandSelections[r.id]) || 1;
    const islandHtml = '<div class="island-wrap">' +
      '<div class="island-popup">' + Array.from({length:10}, (_,i) =>
        '<button data-idx="'+(i+1)+'" data-rid="'+r.id+'"' + ((i+1)===island ? ' class="sel"' : '') + '>'+(i+1)+'</button>'
      ).join('') + '</div>' +
      '<button class="island-btn" data-rid="'+r.id+'">岛屿 ' + island + '</button>' +
      '</div>';
    const dailyBadge = r.daily ? '<div class="daily-badge">每日定时</div>' : '';

    return `
      <div class="card ${cls}" data-id="${r.id}"${noteAttr}>
        <button class="cancel-btn" data-id="${r.id}">&times;</button>
        <div class="icon-wrap">
          <img src="icons/${r.name}.png" alt="" loading="lazy"
               onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
          <span class="placeholder" style="display:none">${r.name[0]}</span>
        </div>
        <div class="name">${r.name}</div>
        <div class="time-label">${timeLabel}</div>
        ${dailyBadge}
        <div class="countdown ${countdownCls}">${countdownHtml}</div>
        ${islandHtml}
        <button class="clone-btn" data-rid="${r.id}">+</button>
        <div class="clone-popup" data-rid="${r.id}">
          ${[1,2,3].map(n => {
            const clone = state && state.clones && state.clones[n];
            const busy = clone && (clone.minNotified === false || clone.maxNotified === false);
            const text = busy ? n + ' ⏳' : (clone ? n + ' ✓' : n);
            return '<button class="'+(busy?'busy':'')+'" data-slot="'+n+'">'+text+'</button>';
          }).join('')}
        </div>
        <div class="clone-dots">
          ${[1,2,3].map(n => {
            const clone = state && state.clones && state.clones[n];
            const active = clone && (clone.minNotified === false || clone.maxNotified === false);
            return '<div class="clone-dot'+(active?' active':'')+'"></div>';
          }).join('')}
        </div>
      </div>`;
  }).join('')}</div>`;

  // Bind events
  main.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.classList.contains('cancel-btn')) return;
      if (e.target.closest('.island-wrap')) return;
      onCardClick(parseInt(card.dataset.id));
    });
  });
  main.querySelectorAll('.cancel-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const rid = parseInt(btn.dataset.id);
      const timers = loadTimers();
      delete timers[rid];
      saveTimers(timers);
      toast(resources.find(x => x.id === rid)?.name + ' 所有计时已关闭');
      renderCards();

    btn.addEventListener('click', (e) => {
      e.stopPropagation();

      const wasOpen = popup.classList.contains('open');
      closeAllPopups();
      if (!wasOpen) popup.classList.add('open');
    });
  });

    b.addEventListener('click', (e) => {
      e.stopPropagation();
      const rid = parseInt(b.dataset.rid);
      const idx = parseInt(b.dataset.idx);
      selectIsland(rid, idx);
      closeAllPopups();
    });

  // Clone button events
  main.querySelectorAll('.clone-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();

      const popup = btn.parentElement.querySelector('.clone-popup');
      const wasOpen = popup.classList.contains('open');
      closeAllPopups();
      if (!wasOpen) popup.classList.add('open');

      const slot = parseInt(b.dataset.slot);
      startClone(rid, slot);
      closeAllPopups();

    document._popupListener = true;
    document.addEventListener('click', (e) => {

function onCardClick(resId) {
  const r = resources.find(x => x.id === resId);
  if (!r) return;
  const state = getTimerState(resId);

  if (state && state.daily) {
    if (confirm(r.name + '（岛屿' + (state.island || 1) + '）\n每日0:00和12:00自动提醒中\n\n要取消每日提醒吗？')) {
      cancelTimer(resId);
    }
    return;
  }
  if (state && state.minNotified === true && state.maxNotified === true) {
    cancelTimer(resId);
    toast(r.name + ' 计时已重置，再次点击开始');
    return;
  }
  if (state && (state.minNotified === false || state.maxNotified === false)) {
    cancelTimer(resId);
    return;
  }

  // Start timer
  startTimer(r);
}

function startTimer(r) {
  const timers = loadTimers();
  const now = Date.now();
  const island = islandSelections[r.id] || 1;

  const existingClones = (timers[r.id] && timers[r.id].clones) || {};

  if (r.daily) {
    timers[r.id] = {
      startTime: now,
      min: 0, max: 0,
      minNotified: false, maxNotified: false,
      variable: false, daily: true,
      island: island,
      dailyNotified: {},
      clones: existingClones,
    };
    saveTimers(timers);
    checkDailyTimers(r.id, timers[r.id]);
    renderCards();
    toast('⏱ ' + r.name + '（岛屿' + island + '）：每日0:00和12:00自动提醒');
  } else {
    timers[r.id] = {
      startTime: now,
      min: r.min,
      max: r.max,
      minNotified: false,
      maxNotified: false,
      variable: r.v || false,
      island: island,
      clones: existingClones,
    };
    saveTimers(timers);
    renderCards();
    const label = r.v
      ? formatTime(r.min) + '后"可能刷新"，' + formatTime(r.max) + '后"必定刷新"'
      : formatTime(r.max) + '后通知你';
    toast('⏱ ' + r.name + '（岛屿' + island + '）：' + label);
  }

  // Vibrate on mobile
  if (navigator.vibrate) navigator.vibrate(50);
}

function startClone(rid, slot) {
  const r = resources.find(x => x.id === rid);
  const timers = loadTimers();
  if (!timers[rid]) timers[rid] = {};
  if (!timers[rid].clones) timers[rid].clones = {};

  const existing = timers[rid].clones[slot];
  const isRunning = existing && (existing.minNotified === false || existing.maxNotified === false);

  if (isRunning) {
    cancelTimer(rid, slot);
    toast(r.name + ' 分身' + slot + ' 已停止');
    return;
  }

  const island = islandSelections[rid] || 1;
  timers[rid].clones[slot] = {
    startTime: Date.now(),
    min: r.min, max: r.max,
    minNotified: false, maxNotified: false,
    variable: r.v || false,
    island: island,
  };

  saveTimers(timers);
  renderCards();
  toast('⏱ ' + r.name + ' 分身' + slot + '（岛屿' + island + '）');
  if (navigator.vibrate) navigator.vibrate(50);
}

function closeAllPopups() {
  document.querySelectorAll('.island-popup.open').forEach(p => p.classList.remove('open'));
  document.querySelectorAll('.clone-popup.open').forEach(p => p.classList.remove('open'));
}
function selectIsland(rid, islandNum) {
  islandSelections[rid] = islandNum;
  const timers = loadTimers();
  if (timers[rid]) {
    timers[rid].island = islandNum;
    saveTimers(timers);
  }
  renderCards();
}

function cancelTimer(resId, cloneSlot) {
  const timers = loadTimers();
  if (cloneSlot) {
    if (timers[resId] && timers[resId].clones) {
      timers[resId].clones[cloneSlot] = null;
    }
  } else {
    // Stop main timer but keep clones if any
    if (timers[resId] && timers[resId].clones) {
      const clones = timers[resId].clones;
      timers[resId] = { clones: clones };
      // If no active clones, remove entirely
      const hasActive = Object.values(clones).some(c => c && (c.minNotified === false || c.maxNotified === false));
      if (!hasActive) delete timers[resId];
    } else {
      delete timers[resId];
    }
  }
  saveTimers(timers);
  renderCards();
}

function resetAll() {
  if (confirm('确定要重置所有计时吗？')) {
    localStorage.removeItem(STORAGE_KEY);
    closeAllPopups();
    renderCards();
    toast('所有计时已重置');
  }
}

// ====== 计时检查循环 ======
let timerCheckInterval = null;

function checkTimers() {
  const timers = loadTimers();
  const now = Date.now();
  let changed = false;
  const testMultiplier = testMode ? 60 : 1;

  for (const rid of Object.keys(timers)) {
    const t = timers[rid];
    if (t.daily) { checkDailyTimers(parseInt(rid), t); continue; }
    if (t.minNotified === true && t.maxNotified === true) continue;

    const elapsedReal = (now - t.startTime) / 1000;
    const elapsed = elapsedReal * testMultiplier;

    const r = resources.find(x => x.id === parseInt(rid));
    if (!r) continue;

    const islandTag = '（岛屿' + (t.island || 1) + '）';
    const minSec = Math.max(0, t.min * 60 - 2 * 60);
    const maxSec = Math.max(0, t.max * 60 - 2 * 60);

    // Check "可能刷新" (variable only, min < max)
    if (t.variable && t.minNotified === false && elapsed >= minSec) {
      t.minNotified = true;
      changed = true;
      notify(r.name + ' 可能已刷新', islandTag + ' 刷新范围下限将至（' + formatTime(t.min) + '），请留意地图');
      if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
    }

    // Check "必定刷新" / "已刷新"
    if (t.maxNotified === false && elapsed >= maxSec) {
      if (t.minNotified === false) t.minNotified = true;
      t.maxNotified = true;
      changed = true;
      if (t.variable) {
        notify(r.name + ' 必定已刷新', islandTag + ' 已到最大刷新时间（' + formatTime(t.max) + '），物资已刷新！');
      } else {
        notify(r.name + ' 物资已刷新', islandTag + ' 刷新时间将至（' + formatTime(t.max) + '）');
      }
      if (navigator.vibrate) navigator.vibrate([500, 100, 500, 100, 500]);
    }
  }

  // Check clones
  for (const rid of Object.keys(timers)) {
    const t = timers[rid];
    if (!t.clones) continue;
    for (const slot of [1,2,3]) {
      const c = t.clones[slot];
      if (!c || (c.minNotified === true && c.maxNotified === true)) continue;
      const elapsedReal = (now - c.startTime) / 1000;
      const elapsed = elapsedReal * testMultiplier;
      const r = resources.find(x => x.id === parseInt(rid));
      if (!r) continue;
      const islandTag = '（岛屿' + (c.island || 1) + '）';
      const minSec = Math.max(0, c.min * 60 - 2 * 60);
      const maxSec = Math.max(0, c.max * 60 - 2 * 60);
      if (c.variable && c.minNotified === false && elapsed >= minSec) {
        c.minNotified = true; changed = true;
        notify(r.name + ' 分身' + slot + ' 可能已刷新', islandTag + ' 刷新范围下限将至（' + formatTime(c.min) + '）');
        if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
      }
      if (c.maxNotified === false && elapsed >= maxSec) {
        if (c.minNotified === false) c.minNotified = true;
        c.maxNotified = true; changed = true;
        if (c.variable) {
          notify(r.name + ' 分身' + slot + ' 必定已刷新', islandTag + ' 已到最大刷新时间（' + formatTime(c.max) + '）');
        } else {
          notify(r.name + ' 分身' + slot + ' 物资已刷新', islandTag + ' 刷新时间将至（' + formatTime(c.max) + '）');
        }
        if (navigator.vibrate) navigator.vibrate([500, 100, 500, 100, 500]);
      }
    }
  }

  if (changed) {
    saveTimers(timers);
    renderCards();
  }
}

// ====== Toast ======
let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

// ====== 每日定时检查（远古花苞） ======
function checkDailyTimers(rid, t) {
  const now = new Date();
  const islandTag = '（岛屿' + (t.island || 1) + '）';
  const r = resources.find(x => x.id === rid);
  if (!r) return;

  const targets = [
    { h: 0, m: 0, label: '0:00' },
    { h: 12, m: 0, label: '12:00' },
  ];

  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  let nextTarget = null;
  let changed = false;
  const timers = loadTimers();
  if (!timers[rid]) return;

  // Init notified set if needed
  if (!timers[rid].dailyNotified) timers[rid].dailyNotified = {};

  for (const target of targets) {
    const targetTime = new Date(today.getFullYear(), today.getMonth(), today.getDate(), target.h, target.m, 0);
    const targetKey = today.toDateString() + '-' + target.label;

    if (now >= targetTime && !timers[rid].dailyNotified[targetKey]) {
      timers[rid].dailyNotified[targetKey] = true;
      changed = true;
      notify(r.name + ' 刷新提醒', islandTag + ' 每日' + target.label + ' 定时刷新时间到！');
      if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
    }

    if (targetTime > now) {
      if (!nextTarget || targetTime < nextTarget) nextTarget = targetTime;
    }
  }

  if (changed) saveTimers(timers);

  if (!nextTarget) {
    nextTarget = new Date(today.getFullYear(), today.getMonth(), today.getDate() + 1, 0, 0, 0);
  }

  const delay = nextTarget.getTime() - now.getTime() - 2 * 60 * 1000;
  if (delay > 0) {
    setTimeout(() => {
      const t2 = loadTimers();
      if (t2[rid] && t2[rid].daily) {
        checkDailyTimers(rid, t2[rid]);
      }
    }, Math.min(delay, 2147483647));
  }
}

function toggleTestMode() {
  testMode = !testMode;
  document.getElementById('testLabel').textContent = testMode ? '开' : '关';
  if (testMode) {
    toast('测试模式：1分钟=1秒（倒计时会很快）');
  } else {
    toast('已恢复正常时间');
  }
  renderCards();
}

// ====== 轻量刷新倒计时 ======
function refreshCountdowns() {
  const timers = loadTimers();
  const mult = testMode ? 60 : 1;
  const cards = document.querySelectorAll('.card.running');
  cards.forEach(card => {
    const rid = parseInt(card.dataset.id);
    const state = timers[rid];
    if (!state || !state.startTime) return;
    const r = resources.find(x => x.id === rid);
    if (!r) return;

    if (state.daily) {
      const cdEl = card.querySelector('.countdown');
      if (cdEl) { cdEl.textContent = '每日定时中'; cdEl.className = 'countdown'; }
      return;
    }

    const elapsed = (Date.now() - state.startTime) / 1000 * mult;
    const ADV = 2;
    let nextCheckSec = Infinity;
    if (state.minNotified === false && r.min !== r.max) {
      nextCheckSec = Math.max(0, r.min * 60 - ADV * 60) - elapsed;
      if (nextCheckSec <= 0) nextCheckSec = 0;
    }
    if (state.maxNotified === false) {
      const maxSec = Math.max(0, r.max * 60 - ADV * 60) - elapsed;
      if (maxSec < nextCheckSec && maxSec > 0) nextCheckSec = maxSec;
      if (maxSec <= 0 && state.minNotified === true) nextCheckSec = 0;
    }
    if (nextCheckSec === Infinity) nextCheckSec = Math.max(0, r.max * 60 - ADV * 60) - elapsed;

    const cdEl = card.querySelector('.countdown');
    if (cdEl) {
      if (nextCheckSec <= 0) {
        cdEl.textContent = '已刷新';
        cdEl.className = 'countdown expired-text';
      } else {
        cdEl.textContent = '⏳ ' + formatCountdown(Math.ceil(nextCheckSec));
        cdEl.className = 'countdown';
      }
    }

    // Update clone dots
    if (state.clones) {
      const dots = card.querySelectorAll('.clone-dot');
      [1,2,3].forEach(slot => {
        const c = state.clones[slot];
        const active = c && (c.minNotified === false || c.maxNotified === false);
        if (dots[slot-1]) {
          if (active) dots[slot-1].classList.add('active');
          else dots[slot-1].classList.remove('active');
        }
      });
    }
  });
}

// ====== 初始化 ======
function initApp() {
  renderNav();
  renderCards();

  // iOS install guide (Safari, not in standalone mode)
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  const isStandalone = navigator.standalone ||
    window.matchMedia('(display-mode: standalone)').matches;
  if (isIOS && !isStandalone) {
    document.getElementById('iosGuide').classList.add('show');
  }

  // Check notification permission
  if ('Notification' in window && Notification.permission === 'default') {
    document.getElementById('permBanner').classList.add('show');
  }
  if ('Notification' in window && Notification.permission === 'granted') {
    document.getElementById('permBanner').classList.remove('show');
  }

  // Start checking loop
  timerCheckInterval = setInterval(checkTimers, MIN_CHECK_INTERVAL);
  // Lightweight countdown refresh every second
  setInterval(refreshCountdowns, 1000);

  // Check immediately for timers that expired while away
  checkTimers();

  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
}

async function init() {
  const valid = await checkActivation();
  if (valid) {
    document.getElementById('lockScreen').classList.add('hidden');
    updateStatus();
    initApp();
  }
}

document.addEventListener('DOMContentLoaded', init);

// Wake lock to prevent phone from sleeping while page is open
if ('wakeLock' in navigator) {
  try {
    navigator.wakeLock.request('screen').catch(() => {});
  } catch(e) {}
}
</script>
